<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AiCam Viewer</title>
<style>
:root{--bg:#0a0c12;--card:#141820;--card2:#1a1f2a;--accent:#4f8cff;--accent2:#7c5cff;--text:#eaeaf4;--muted:#6e7490;--border:#252a38;--green:#4ade80;--red:#f87171}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(10,12,18,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:17px;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
.dot.on{background:var(--green)}.dot.off{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-info{margin-left:auto;font-size:11px;color:var(--muted)}

/* Timeline */
.timeline-box{margin:16px 20px;background:var(--card);border-radius:12px;padding:18px 22px}
.timeline-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.timeline-top h2{font-size:13px;font-weight:500;color:var(--muted)}
.window-btns{display:flex;gap:6px}
.window-btns button{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:16px;font-size:11px;cursor:pointer;transition:background .15s}
.window-btns button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.window-btns button:hover{background:var(--accent2);color:#fff}

.slider-area{position:relative;height:52px;margin:0 8px}
.slider-track{position:absolute;top:22px;width:100%;height:8px;background:var(--card2);border-radius:4px}
.slider-window{position:absolute;top:20px;height:12px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;cursor:grab;transition:left .05s}
.slider-window:active{cursor:grabbing}
.slider-window::before,.slider-window::after{content:'';position:absolute;top:-4px;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.slider-window::before{left:-10px}
.slider-window::after{right:-10px}

.time-tooltip{position:absolute;top:-2px;background:var(--card2);border:1px solid var(--border);padding:4px 10px;border-radius:8px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
.time-tooltip.visible{opacity:1}
.time-tooltip.left{left:0;transform:translateX(-20%)}
.time-tooltip.right{right:0;transform:translateX(20%)}

.timeline-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px}
.timeline-footer .window-label{color:var(--accent);font-weight:600}
.timeline-footer .total-label{color:var(--muted)}

/* Clip Grid */
.clips-section{padding:0 20px 20px}
.clips-section h3{font-size:13px;color:var(--muted);margin-bottom:10px;padding-left:4px}
.clips-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.clip-card{position:relative;background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.clip-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(79,140,255,.2)}
.clip-card.active{outline:2px solid var(--accent)}
.clip-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--card2);display:block}
.clip-thumb-placeholder{width:100%;aspect-ratio:16/9;background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:24px}
.clip-card-info{padding:8px 10px}
.clip-card-id{font-size:11px;font-weight:700;background:var(--accent2);color:#fff;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:4px}
.clip-card.active .clip-card-id{background:var(--accent)}
.clip-card-time{font-size:12px;font-weight:500}
.clip-card-meta{font-size:10px;color:var(--muted);margin-top:2px}

/* Full-screen Player */
.player-overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:500;display:none;flex-direction:column}
.player-overlay.visible{display:flex}
.player-top{display:flex;align-items:center;padding:12px 20px;gap:14px}
.player-top h3{font-size:15px;font-weight:500;flex:1}
.player-nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .15s}
.player-nav-btn:hover{background:var(--accent);color:#000}
.player-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer}
.player-close:hover{color:var(--text)}
.player-video{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 20px}
.player-video video{width:100%;max-height:100%;border-radius:8px;background:#000}

/* Frame Carousel */
.frame-carousel{padding:12px 20px 16px;background:var(--card);border-top:1px solid var(--border)}
.frame-carousel-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.frame-carousel-header span{font-size:12px;color:var(--muted)}
.frame-nav{display:flex;gap:6px}
.frame-nav button{background:var(--card2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.frame-nav button:hover{background:var(--accent);color:#000}
.frame-strip{display:flex;gap:8px;overflow-x:auto;scroll-behavior:smooth;padding:4px 0}
.frame-strip::-webkit-scrollbar{height:4px}
.frame-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.frame-thumb{flex-shrink:0;width:120px;height:80px;border-radius:6px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s}
.frame-thumb:hover{transform:scale(1.05)}
.frame-thumb.active{border-color:var(--accent)}

/* Frame Fullscreen */
.frame-full{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:600;display:none;align-items:center;justify-content:center}
.frame-full.visible{display:flex}
.frame-full img{max-width:90%;max-height:80%;border-radius:8px}
.frame-full-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px}
.frame-full-nav:hover{background:var(--accent);color:#000}
.frame-full-nav.left{left:20px}
.frame-full-nav.right{right:20px}
.frame-full-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;z-index:10}
.frame-full-close:hover{color:var(--text)}
.frame-full-info{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);padding:6px 16px;border-radius:20px;font-size:12px;color:var(--muted)}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>📹 AiCam</h1>
  <div class="dot off" id="liveDot"></div>
  <span class="header-info" id="headerInfo">connecting…</span>
</div>

<div class="timeline-box">
  <div class="timeline-top">
    <h2>Timeline</h2>
    <div class="window-btns">
      <button data-win="5" onclick="setWindow(5)">5m</button>
      <button data-win="10" class="active" onclick="setWindow(10)">10m</button>
      <button data-win="30" onclick="setWindow(30)">30m</button>
      <button data-win="60" onclick="setWindow(60)">1h</button>
    </div>
  </div>
  <div class="slider-area" id="sliderArea">
    <div class="slider-track"></div>
    <div class="slider-window" id="sliderWindow"></div>
    <div class="time-tooltip left" id="ttLeft"></div>
    <div class="time-tooltip right" id="ttRight"></div>
  </div>
  <div class="timeline-footer">
    <span class="window-label" id="windowLabel">—</span>
    <span class="total-label" id="totalLabel"></span>
  </div>
</div>

<div class="clips-section">
  <h3 id="clipsHeading">Clips</h3>
  <div class="clips-list" id="clipsList">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<!-- Full-screen video player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-top">
    <button class="player-nav-btn" onclick="prevClip()" title="Previous clip">◀</button>
    <h3 id="playerTitle">Clip</h3>
    <button class="player-nav-btn" onclick="nextClip()" title="Next clip">▶</button>
    <button class="player-close" onclick="closePlayer()">✕</button>
  </div>
  <div class="player-video">
    <video id="videoEl" controls autoplay></video>
  </div>
  <div class="frame-carousel">
    <div class="frame-carousel-header">
      <span id="frameInfo">Frames</span>
      <div class="frame-nav">
        <button onclick="scrollFrames(-1)">◀</button>
        <button onclick="scrollFrames(1)">▶</button>
      </div>
    </div>
    <div class="frame-strip" id="frameStrip"></div>
  </div>
</div>

<!-- Frame full-screen -->
<div class="frame-full" id="frameFull">
  <button class="frame-full-close" onclick="closeFrameFull()">✕</button>
  <button class="frame-full-nav left" onclick="navFrame(-1)">◀</button>
  <img id="frameFullImg" src="">
  <button class="frame-full-nav right" onclick="navFrame(1)">▶</button>
  <div class="frame-full-info" id="frameFullInfo"></div>
</div>

<script>
const API = window.location.origin;
let gMin=0, gMax=0, totalClips=0;
let windowMin=10; // minutes
let sliderPct=1; // 0..1 position of window center on timeline (1 = rightmost = latest)
let currentClips=[];
let currentClipIdx=-1;
let currentFrames=[];
let currentFrameIdx=0;
let dragging=false, dragStartX=0, dragStartPct=0;

// ─── Init ───
async function init(){
  try{
    const r=await fetch(`${API}/api/native/clips/range`);
    const d=await r.json();
    gMin=d.min_ts||0;
    gMax=Math.max(d.max_ts||0, Date.now()/1000); // always extend to current time
    totalClips=d.total_clips||0;
    document.getElementById('liveDot').className='dot on';
    document.getElementById('headerInfo').textContent=`${totalClips} clips total`;
    positionSliderAtEnd();
    loadClips();
  }catch(e){
    document.getElementById('liveDot').className='dot off';
    document.getElementById('headerInfo').textContent='offline';
    document.getElementById('clipsList').innerHTML='<div class="empty-state">Cannot reach backend</div>';
  }
}

// ─── Time helpers ───
function fmtIST(ts){
  return new Date(ts*1000).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
}
function fmtTime(ts){
  return new Date(ts*1000).toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
}

// ─── Window logic ───
// sliderPct = position of the window's RIGHT EDGE on the timeline (0=start, 1=now)
function setWindow(m){
  windowMin=m;
  document.querySelectorAll('.window-btns button').forEach(b=>b.classList.toggle('active',+b.dataset.win===m));
  sliderPct=1; // snap to latest
  updateSliderUI();
  loadClips();
}

function getWindowTs(){
  const now=Date.now()/1000;
  const effectiveMax=Math.max(gMax,now);
  const range=effectiveMax-gMin;
  const winSec=windowMin*60;
  // sliderPct=1 means window end = effectiveMax (now)
  const windowEnd=gMin + range*sliderPct;
  const windowStart=windowEnd - winSec;
  return{start:Math.max(gMin,windowStart), end:Math.min(effectiveMax,windowEnd)};
}

function positionSliderAtEnd(){sliderPct=1;updateSliderUI();}

function updateSliderUI(){
  const now=Date.now()/1000;
  const effectiveMax=Math.max(gMax,now);
  const range=effectiveMax-gMin;
  if(range<=0)return;
  const winSec=windowMin*60;
  const winFrac=Math.min(1,winSec/range);
  // Clamp: window end can't go below gMin+winSec, can't exceed effectiveMax
  const minPct=Math.min(1,winSec/range); // minimum sliderPct so window start >= gMin
  sliderPct=Math.max(minPct,Math.min(1,sliderPct));
  // Visual: window occupies [sliderPct-winFrac .. sliderPct] of the track
  const leftPct=Math.max(0,(sliderPct-winFrac)*100);
  const widthPct=Math.min(100,winFrac*100);
  const sw=document.getElementById('sliderWindow');
  sw.style.left=leftPct+'%';
  sw.style.width=widthPct+'%';

  const w=getWindowTs();
  document.getElementById('ttLeft').textContent=fmtIST(w.start);
  document.getElementById('ttLeft').classList.add('visible');
  document.getElementById('ttRight').textContent=fmtIST(w.end);
  document.getElementById('ttRight').classList.add('visible');
  document.getElementById('ttLeft').style.left=leftPct+'%';
  document.getElementById('ttRight').style.left=Math.min(100,leftPct+widthPct)+'%';
  document.getElementById('ttRight').style.transform='translateX(-100%)';
  document.getElementById('windowLabel').textContent=`${fmtTime(w.start)} — ${fmtTime(w.end)}`;
}

// ─── Dragging ───
const sliderArea=document.getElementById('sliderArea');
const sliderWin=document.getElementById('sliderWindow');
sliderWin.addEventListener('mousedown',e=>{dragging=true;dragStartX=e.clientX;dragStartPct=sliderPct;e.preventDefault();});
sliderWin.addEventListener('touchstart',e=>{dragging=true;dragStartX=e.touches[0].clientX;dragStartPct=sliderPct;});
document.addEventListener('mousemove',onDrag);
document.addEventListener('touchmove',e=>onDrag(e.touches[0]));
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function onDrag(e){
  if(!dragging)return;
  const rect=sliderArea.getBoundingClientRect();
  const dx=(e.clientX-dragStartX)/rect.width;
  const now=Date.now()/1000;
  const effectiveMax=Math.max(gMax,now);
  const range=effectiveMax-gMin;
  const winSec=windowMin*60;
  const minPct=Math.min(1,winSec/range);
  sliderPct=Math.max(minPct,Math.min(1,dragStartPct+dx));
  updateSliderUI();
}
function endDrag(){
  if(!dragging)return;
  dragging=false;
  loadClips();
}

// Click on track to jump
sliderArea.addEventListener('click',e=>{
  if(dragging)return;
  const rect=sliderArea.getBoundingClientRect();
  const clickPct=(e.clientX-rect.left)/rect.width;
  const now=Date.now()/1000;
  const effectiveMax=Math.max(gMax,now);
  const range=effectiveMax-gMin;
  const winSec=windowMin*60;
  const winFrac=Math.min(1,winSec/range);
  // Clicked position = right edge of window
  const minPct=Math.min(1,winSec/range);
  sliderPct=Math.max(minPct,Math.min(1,clickPct+winFrac/2));
  updateSliderUI();
  loadClips();
});

// ─── Load clips ───
async function loadClips(){
  const w=getWindowTs();
  const list=document.getElementById('clipsList');
  list.innerHTML='<div class="empty-state">Loading…</div>';
  try{
    const r=await fetch(`${API}/api/native/clips?start=${w.start}&end=${w.end}`);
    const d=await r.json();
    currentClips=d.clips||[];
    document.getElementById('clipsHeading').textContent=`${currentClips.length} clips in window`;
    document.getElementById('totalLabel').textContent=`${totalClips} total`;
    if(!currentClips.length){list.innerHTML='<div class="empty-state">No clips here — drag the window</div>';return;}
    list.innerHTML=currentClips.map((c,i)=>`
      <div class="clip-card" onclick="openClip(${i})" id="crow-${i}">
        <img class="clip-thumb" src="${API}/media/clip/${c.id}/thumb" onerror="this.outerHTML='<div class=\\'clip-thumb-placeholder\\'>🎬</div>'">
        <div class="clip-card-info">
          <span class="clip-card-id">#${c.id}</span>
          <div class="clip-card-time">${fmtTime(c.start_ts)}</div>
          <div class="clip-card-meta">${c.duration_sec?c.duration_sec.toFixed(1)+'s':'~10s'} · ${c.sampled_frames||0} frames</div>
        </div>
      </div>
    `).join('');
  }catch(e){list.innerHTML='<div class="empty-state">Error loading clips</div>';}
}

// ─── Player ───
function openClip(idx){
  currentClipIdx=idx;
  const c=currentClips[idx];if(!c)return;
  document.querySelectorAll('.clip-card').forEach(r=>r.classList.remove('active'));
  const row=document.getElementById('crow-'+idx);if(row)row.classList.add('active');

  document.getElementById('playerOverlay').classList.add('visible');
  document.getElementById('playerTitle').textContent=`Clip #${c.id} — ${fmtIST(c.start_ts)}`;
  const vid=document.getElementById('videoEl');
  vid.src=`${API}/media/clip/${c.id}`;
  vid.load();vid.play();
  loadFrames(c.id);
  document.body.style.overflow='hidden';
}

function closePlayer(){
  document.getElementById('playerOverlay').classList.remove('visible');
  document.getElementById('videoEl').pause();
  document.body.style.overflow='';
}
function prevClip(){if(currentClipIdx>0)openClip(currentClipIdx-1);}
function nextClip(){if(currentClipIdx<currentClips.length-1)openClip(currentClipIdx+1);}

async function loadFrames(clipId){
  const strip=document.getElementById('frameStrip');
  strip.innerHTML='';
  try{
    const r=await fetch(`${API}/api/native/clips/${clipId}/frames`);
    const d=await r.json();
    currentFrames=d.frames||[];
    document.getElementById('frameInfo').textContent=`${currentFrames.length} frames`;
    strip.innerHTML=currentFrames.map((f,i)=>
      `<img class="frame-thumb" src="${API}/media/frame/${f.id}" onclick="openFrame(${i})" title="${fmtTime(f.abs_ts)} (${f.video_time_sec.toFixed(1)}s)">`
    ).join('');
  }catch(e){strip.innerHTML='<span style="color:var(--muted);font-size:12px">Error</span>';}
}

function scrollFrames(dir){
  const strip=document.getElementById('frameStrip');
  strip.scrollBy({left:dir*260,behavior:'smooth'});
}

// ─── Frame fullscreen ───
function openFrame(idx){
  currentFrameIdx=idx;
  showFrame();
  document.getElementById('frameFull').classList.add('visible');
}
function showFrame(){
  const f=currentFrames[currentFrameIdx];if(!f)return;
  document.getElementById('frameFullImg').src=`${API}/media/frame/${f.id}`;
  document.getElementById('frameFullInfo').textContent=`Frame ${currentFrameIdx+1}/${currentFrames.length} — ${fmtIST(f.abs_ts)}`;
  // highlight thumb
  document.querySelectorAll('.frame-thumb').forEach((t,i)=>t.classList.toggle('active',i===currentFrameIdx));
}
function closeFrameFull(){document.getElementById('frameFull').classList.remove('visible');}
function navFrame(dir){
  currentFrameIdx=Math.max(0,Math.min(currentFrames.length-1,currentFrameIdx+dir));
  showFrame();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('frameFull').classList.contains('visible')){
    if(e.key==='ArrowLeft')navFrame(-1);
    if(e.key==='ArrowRight')navFrame(1);
    if(e.key==='Escape')document.getElementById('frameFull').classList.remove('visible');
    return;
  }
  if(document.getElementById('playerOverlay').classList.contains('visible')){
    if(e.key==='ArrowLeft')prevClip();
    if(e.key==='ArrowRight')nextClip();
    if(e.key==='Escape')closePlayer();
  }
});

init();
// Auto-refresh every 30s
setInterval(()=>{if(!dragging&&!document.getElementById('playerOverlay').classList.contains('visible')){
  fetch(`${API}/api/native/clips/range`).then(r=>r.json()).then(d=>{gMax=Math.max(d.max_ts||0,Date.now()/1000);totalClips=d.total_clips||totalClips;document.getElementById('headerInfo').textContent=totalClips+' clips total';if(sliderPct>.95){sliderPct=1;updateSliderUI();loadClips();}}).catch(()=>{});
}},30000);
</script>
</body>
</html>

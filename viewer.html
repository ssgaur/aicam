<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AiCam Viewer</title>
<style>
:root{--bg:#0f1117;--card:#1a1d28;--accent:#4f8cff;--accent2:#6c5ce7;--text:#e8e8f0;--muted:#8888a0;--border:#2c2f3a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:600;white-space:nowrap}
.status{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--card)}
.status.ok{color:#6bff8e}.status.err{color:#ff6b6b}
.timeline-section{padding:16px 20px;background:var(--card);margin:12px 16px;border-radius:10px}
.timeline-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
.range-wrap{position:relative;height:40px;display:flex;align-items:center}
.range-track{position:absolute;width:100%;height:6px;background:#2c2f3a;border-radius:3px}
.range-fill{position:absolute;height:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px}
input[type=range]{position:absolute;width:100%;-webkit-appearance:none;appearance:none;background:transparent;pointer-events:none;height:40px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;pointer-events:auto;border:2px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,.4)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;pointer-events:auto;border:2px solid var(--bg)}
.info-row{display:flex;gap:20px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.info-row span{background:var(--bg);padding:3px 10px;border-radius:12px}
.clips-grid{padding:0 16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.clip-card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.clip-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(79,140,255,.15)}
.clip-card.active{border:2px solid var(--accent)}
.clip-top{display:flex;align-items:center;gap:10px;padding:12px 14px}
.clip-badge{font-size:11px;font-weight:700;background:var(--accent);color:#000;border-radius:6px;padding:2px 8px}
.clip-time{font-size:12px;color:var(--muted)}
.clip-meta{padding:0 14px 12px;font-size:12px;color:var(--muted)}
.player-section{margin:0 16px 16px;background:var(--card);border-radius:10px;overflow:hidden;display:none}
.player-section.visible{display:block}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.player-header h3{font-size:14px}
.close-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.close-btn:hover{color:var(--text)}
video{width:100%;max-height:400px;background:#000}
.frames-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;padding:12px;max-height:320px;overflow-y:auto}
.frames-grid img{width:100%;border-radius:4px;cursor:pointer;transition:transform .1s}
.frames-grid img:hover{transform:scale(1.05)}
.frame-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1000;cursor:zoom-out}
.frame-modal.visible{display:flex}
.frame-modal img{max-width:95%;max-height:95%;border-radius:6px}
.loading{text-align:center;padding:40px;color:var(--muted)}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="header">
  <h1>📹 AiCam Viewer</h1>
  <span class="status" id="connStatus">connecting…</span>
  <span style="margin-left:auto;font-size:12px;color:var(--muted)" id="clipCount"></span>
</div>

<div class="timeline-section">
  <div class="timeline-label">
    <span id="startLabel">—</span>
    <span id="endLabel">—</span>
  </div>
  <div class="range-wrap">
    <div class="range-track"></div>
    <div class="range-fill" id="rangeFill"></div>
    <input type="range" id="rangeStart" min="0" max="1000" value="0">
    <input type="range" id="rangeEnd" min="0" max="1000" value="1000">
  </div>
  <div class="info-row">
    <span id="windowInfo">Drag the handles to select a time window</span>
  </div>
</div>

<div class="player-section" id="playerSection">
  <div class="player-header">
    <h3 id="playerTitle">Clip</h3>
    <button class="close-btn" onclick="closePlayer()">✕</button>
  </div>
  <video id="videoPlayer" controls></video>
  <div class="frames-grid" id="framesGrid"></div>
</div>

<div id="clipsContainer" class="clips-grid">
  <div class="loading">Loading timeline…</div>
</div>

<div class="frame-modal" id="frameModal" onclick="closeModal()">
  <img id="modalImg" src="">
</div>

<script>
const API = window.location.origin;
let globalMin = 0, globalMax = 0, totalClips = 0;
let debounceTimer = null;

async function init() {
  try {
    const r = await fetch(`${API}/api/native/clips/range`);
    const d = await r.json();
    globalMin = d.min_ts || 0;
    globalMax = d.max_ts || Date.now()/1000;
    totalClips = d.total_clips || 0;
    document.getElementById('connStatus').textContent = 'connected';
    document.getElementById('connStatus').classList.add('ok');
    // Default: show last 5 minutes
    const range = globalMax - globalMin;
    if (range > 0) {
      const last5m = Math.max(0, 1 - (300 / range));
      document.getElementById('rangeStart').value = Math.round(last5m * 1000);
      document.getElementById('rangeEnd').value = 1000;
    }
    updateLabels();
    loadClips();
  } catch(e) {
    document.getElementById('connStatus').textContent = 'offline';
    document.getElementById('connStatus').classList.add('err');
    document.getElementById('clipsContainer').innerHTML = '<div class="empty">Cannot reach backend at ' + API + '</div>';
  }
}

function tsToLocal(ts) {
  return new Date(ts * 1000).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function getStartTs() {
  const pct = parseInt(document.getElementById('rangeStart').value) / 1000;
  return globalMin + pct * (globalMax - globalMin);
}
function getEndTs() {
  const pct = parseInt(document.getElementById('rangeEnd').value) / 1000;
  return globalMin + pct * (globalMax - globalMin);
}

function updateLabels() {
  const s = getStartTs(), e = getEndTs();
  document.getElementById('startLabel').textContent = tsToLocal(s);
  document.getElementById('endLabel').textContent = tsToLocal(e);
  // fill bar
  const p1 = parseInt(document.getElementById('rangeStart').value)/10;
  const p2 = parseInt(document.getElementById('rangeEnd').value)/10;
  const fill = document.getElementById('rangeFill');
  fill.style.left = p1 + '%';
  fill.style.width = (p2 - p1) + '%';
  const dur = e - s;
  const mins = Math.round(dur/60);
  document.getElementById('windowInfo').textContent = `Window: ${mins < 60 ? mins+'m' : (dur/3600).toFixed(1)+'h'}`;
}

function onRangeChange() {
  // ensure start < end
  const rs = document.getElementById('rangeStart');
  const re = document.getElementById('rangeEnd');
  if (parseInt(rs.value) > parseInt(re.value) - 10) {
    rs.value = parseInt(re.value) - 10;
  }
  updateLabels();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadClips, 300);
}

async function loadClips() {
  const s = getStartTs(), e = getEndTs();
  const container = document.getElementById('clipsContainer');
  container.innerHTML = '<div class="loading">Loading clips…</div>';
  try {
    const r = await fetch(`${API}/api/native/clips?start=${s}&end=${e}`);
    const d = await r.json();
    document.getElementById('clipCount').textContent = `${d.count} of ${totalClips} clips`;
    if (!d.clips || d.clips.length === 0) {
      container.innerHTML = '<div class="empty">No clips in this window. Drag the timeline handles.</div>';
      return;
    }
    container.innerHTML = d.clips.map(c => `
      <div class="clip-card" onclick="openClip(${c.id})" id="card-${c.id}">
        <div class="clip-top">
          <span class="clip-badge">#${c.id}</span>
          <span class="clip-time">${tsToLocal(c.start_ts)} → ${tsToLocal(c.end_ts)}</span>
        </div>
        <div class="clip-meta">
          ${c.duration_sec ? c.duration_sec.toFixed(1)+'s' : '~10s'} · ${c.sampled_frames || 0} frames · ${c.status}
        </div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = '<div class="empty">Error loading clips</div>';
  }
}

async function openClip(clipId) {
  // highlight card
  document.querySelectorAll('.clip-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + clipId);
  if (card) card.classList.add('active');

  const section = document.getElementById('playerSection');
  section.classList.add('visible');
  document.getElementById('playerTitle').textContent = `Clip #${clipId}`;

  // video
  const video = document.getElementById('videoPlayer');
  video.src = `${API}/media/clip/${clipId}`;
  video.load();

  // frames
  const grid = document.getElementById('framesGrid');
  grid.innerHTML = '<span style="color:var(--muted);font-size:12px">Loading frames…</span>';
  try {
    const r = await fetch(`${API}/api/native/clips/${clipId}/frames`);
    const d = await r.json();
    if (!d.frames || d.frames.length === 0) {
      grid.innerHTML = '<span style="color:var(--muted);font-size:12px">No sampled frames</span>';
      return;
    }
    grid.innerHTML = d.frames.map(f =>
      `<img src="${API}/media/frame/${f.id}" alt="frame ${f.frame_index}" title="${f.iso} (${f.video_time_sec.toFixed(1)}s)" onclick="event.stopPropagation();showModal('${API}/media/frame/${f.id}')">`
    ).join('');
  } catch(e) {
    grid.innerHTML = '<span style="color:var(--muted);font-size:12px">Error loading frames</span>';
  }
  section.scrollIntoView({behavior:'smooth',block:'start'});
}

function closePlayer() {
  document.getElementById('playerSection').classList.remove('visible');
  document.getElementById('videoPlayer').pause();
  document.querySelectorAll('.clip-card').forEach(c => c.classList.remove('active'));
}

function showModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('frameModal').classList.add('visible');
}
function closeModal() {
  document.getElementById('frameModal').classList.remove('visible');
}

document.getElementById('rangeStart').addEventListener('input', onRangeChange);
document.getElementById('rangeEnd').addEventListener('input', onRangeChange);
document.addEventListener('keydown', e => { if(e.key==='Escape') { closeModal(); closePlayer(); }});

init();
</script>
</body>
</html>
